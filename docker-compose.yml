services:
  telepi:
    build: .
    container_name: telepi
    restart: unless-stopped
    volumes:
      # Mount config file
      - ~/.config/telepi/.env:/home/telepi/.config/telepi/.env:ro
      # Mount Pi sessions directory
      - ~/.pi:/home/telepi/.pi
      # Mount workspace (adjust as needed)
      - ${TELEPI_WORKSPACE:-.}:/workspace
    environment:
      - TELEPI_CONFIG=/home/telepi/.config/telepi/.env
    network_mode: host
