services:
  telepi:
    build: .
    container_name: telepi
    restart: unless-stopped
    volumes:
      # Mount config file
      - ~/.pi/telepi/config.toml:/home/telepi/.pi/telepi/config.toml:ro
      # Mount Pi sessions directory
      - ~/.pi:/home/telepi/.pi
      # Mount workspace (adjust as needed)
      - ${TELEPI_WORKSPACE:-.}:/workspace
    environment:
      - TELEPI_CONFIG=/home/telepi/.pi/telepi/config.toml
    network_mode: host
